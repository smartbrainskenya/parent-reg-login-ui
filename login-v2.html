<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Login — Smart Brains Kenya</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #1a0533 0%, #2d1260 45%, #0d9488 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(55px);
    opacity: 0.25;
    pointer-events: none;
  }
  .blob-1 { width:260px; height:260px; background:#6D28D9; top:-60px; left:-60px; }
  .blob-2 { width:220px; height:220px; background:#10b981; bottom:-50px; right:-50px; }

  /* CARD */
  .card {
    width: 100%;
    max-width: 360px;
    background: rgba(255,255,255,0.97);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: up 0.4s ease both;
  }
  @keyframes up {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* LOGO INLINE */
  .card-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .card-logo svg { width: 20px; height: 20px; }
  .card-logo span {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #9CA3AF;
    letter-spacing: 0.8px;
  }

  .divider { height:1px; background:#F3F4F6; margin: 0 -24px 18px; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #1E1B4B;
    text-align: center;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 13px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 18px;
  }

  /* INFO BOX */
  .info-box {
    background: #F5F3FF;
    border-radius: 10px;
    padding: 10px 13px;
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .info-box .ii { font-size: 14px; flex-shrink:0; margin-top:1px; }
  .info-box p { font-size: 12px; color: #4C1D95; line-height: 1.55; font-weight: 600; }
  .info-box p strong { color: #3B0764; }

  /* FIELDS */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 6px;
  }

  .phone-row { display: flex; gap: 7px; }
  .phone-prefix {
    flex-shrink: 0;
    width: 58px;
    padding: 12px 6px;
    border: 1.5px solid #E5E7EB;
    border-radius: 11px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    background: #F9FAFB;
    text-align: center;
  }
  .phone-row input { flex:1; }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #E5E7EB;
    border-radius: 11px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: #111827;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    background: white;
  }
  input::placeholder { color: #C4C4C4; }
  input:focus {
    border-color: #6D28D9;
    box-shadow: 0 0 0 3px rgba(109,40,217,0.08);
  }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: #9CA3AF;
    font-size: 15px; padding: 4px; line-height:1;
  }

  .forgot {
    text-align: right;
    margin-top: -4px;
    margin-bottom: 14px;
  }
  .forgot a { font-size: 12px; color: #6D28D9; font-weight: 700; text-decoration: none; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6D28D9, #4C1D95);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(109,40,217,0.35);
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { opacity: 0.92; }
  .btn-submit:active { transform: scale(0.98); }

  .signup-link {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: #9CA3AF;
  }
  .signup-link a { color: #6D28D9; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">

  <div class="card-logo">
    <svg viewBox="0 0 24 24" fill="none">
      <polygon points="12,2 22,20 2,20" stroke="#FCD34D" stroke-width="2" fill="none"/>
      <line x1="12" y1="2" x2="12" y2="20" stroke="#818CF8" stroke-width="1.5"/>
    </svg>
    <span>SMART BRAINS KENYA</span>
  </div>

  <div class="divider"></div>

  <div class="card-title">Parent Dashboard</div>
  <div class="card-sub">Welcome back! Check your child's progress.</div>

  <div class="info-box">
    <span class="ii">📱</span>
    <p>Your username is your <strong>WhatsApp number without the leading zero</strong> — e.g. 0712345678 → log in with <strong>712345678</strong></p>
  </div>

  <form>
    <div class="field">
      <label>Phone Number (Username)</label>
      <div class="phone-row">
        <div class="phone-prefix">+254</div>
        <input type="tel" placeholder="712345678" maxlength="9" inputmode="numeric"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Enter your password"/>
        <button type="button" class="pw-toggle" onclick="togglePw()">👁</button>
      </div>
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn-submit" type="submit">Log In</button>
  </form>

  <div class="signup-link">
    Don't have an account? <a href="./signup-v2.html">Sign up today</a>
  </div>

</div>

<script>
  function togglePw() {
    const input = document.getElementById('pw');
    const btn = document.querySelector('.pw-toggle');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }
</script>
</body>
</html>
